<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - Student Task Marketplace</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📋</text></svg>">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">🏆 Leaderboard</h1>
      <div class="nav-links">
        <button id="nav-dashboard" class="btn btn-secondary">Dashboard</button>
        <button id="nav-logout" class="btn btn-danger">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="card">
      <h2>Top Task Completers</h2>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('leaderboard-all-time')">All Time</button>
        <button class="tab-btn" onclick="switchTab('leaderboard-this-month')">This Month</button>
        <button class="tab-btn" onclick="switchTab('leaderboard-this-week')">This Week</button>
      </div>

      <div id="leaderboard-all-time" class="tab-content">
        <div id="leaderboard-all-time-list" class="leaderboard-list"></div>
      </div>
      <div id="leaderboard-this-month" class="tab-content" style="display:none;">
        <div id="leaderboard-this-month-list" class="leaderboard-list"></div>
      </div>
      <div id="leaderboard-this-week" class="tab-content" style="display:none;">
        <div id="leaderboard-this-week-list" class="leaderboard-list"></div>
      </div>
    </div>

    <!-- Your Rank -->
    <div class="card info-card">
      <h2>📈 Your Stats</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <h3 id="your-rank">-</h3>
          <p>Your Rank</p>
        </div>
        <div class="stat-card">
          <h3 id="your-score">0</h3>
          <p>Tasks Completed</p>
        </div>
        <div class="stat-card">
          <h3 id="your-points">0</h3>
          <p>Total Points</p>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/config.js"></script>
  <script src="scripts/utils.js"></script>
  <!-- <script src="scripts/auth.js"></script> -->
  <script src="scripts/leaderboard.js"></script>
</body>
</html>
